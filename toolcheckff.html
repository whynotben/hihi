<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Dimensional</title>
    
    <!-- All CSS is here -->
    <style>
        /* Importing modern and stylish fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Creepster&display=swap');

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            /* Animated gradient background */
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
            color: white;
            overflow: hidden;
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Animation for the background gradient */
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Styling the calm screen container */
        #calm-screen {
            z-index: 10;
            padding: 40px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: fade-in 1.5s ease-out;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #calm-screen .icon {
            font-size: 4em;
            margin-bottom: 10px;
            animation: pulse-glow 2s infinite;
        }

        #calm-screen h1 {
            font-size: 2.5em;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        #calm-screen p {
            font-size: 1.1em;
            font-weight: 300;
            margin: 0 0 25px 0;
            color: #e0e0e0;
        }

        #enterButton {
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px 0 rgba(0, 210, 255, 0.4);
            animation: pulse-glow 2s infinite;
        }

        #enterButton:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px 0 rgba(0, 210, 255, 0.6);
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
            50% { box-shadow: 0 0 20px rgba(0, 210, 255, 0.8); }
            100% { box-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        }

        /* --- CHAOS SCREEN STYLES --- */
        #chaos-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        #chaosText {
            font-family: 'Creepster', cursive;
            font-size: 5em;
            color: #ff4757;
            text-shadow: 3px 3px #000;
            animation: shake 0.5s infinite;
        }

        /* --- FAKE CHROME WINDOWS STYLES --- */
        #fake-windows-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        .fake-chrome-window {
            position: absolute;
            width: 500px;
            height: 350px;
            background-color: #f0f0f0;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            animation: bounce-in 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .fake-chrome-header {
            background-color: #e8e8e8;
            padding: 8px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #d3d3d3;
        }

        .fake-chrome-controls {
            display: flex;
            gap: 8px;
        }

        .fake-chrome-control-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        .fake-chrome-control-btn.close { background-color: #ff5f57; }
        .fake-chrome-control-btn.minimize { background-color: #ffbd2e; }
        .fake-chrome-control-btn.maximize { background-color: #28ca42; }

        .fake-chrome-address-bar {
            flex-grow: 1;
            margin: 0 10px;
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: white;
            font-size: 12px;
            color: #555;
        }

        .fake-chrome-content {
            flex-grow: 1;
            padding: 15px;
            font-size: 14px;
            color: #333;
            background-color: white;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            overflow: auto;
        }
        
        .fake-alert {
            padding: 10px;
            border: 1px solid #f5c6cb;
            background-color: #f8d7da;
            color: #721c24;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        /* --- ANIMATIONS --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }

        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- The initial, calm screen -->
    <div id="calm-screen">
        <div class="icon">🚀</div>
        <h1>Welcome to the Future</h1>
        <p>Experience a new dimension of the web.</p>
        <button id="enterButton">Teelez</button>
    </div>

    <!-- The chaotic screen, initially hidden -->
    <div id="chaos-screen" style="display: none;">
        <h1 id="chaosText">FUCKED!</h1>
    </div>

    <!-- Container for our fake chrome windows -->
    <div id="fake-windows-container"></div>

    <!-- Audio element for the background sound -->
    <audio id="backgroundSound" loop>
        <source src="https://files.catbox.moe/1fxqdw.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- All JavaScript is here -->
    <script>
        const enterButton = document.getElementById('enterButton');
        const calmScreen = document.getElementById('calm-screen');
        const chaosScreen = document.getElementById('chaos-screen');
        const backgroundSound = document.getElementById('backgroundSound');
        const fakeWindowsContainer = document.getElementById('fake-windows-container');
        const body = document.body;

        let chaosInterval;

        function startChaos() {
            console.log("SUPER PRANK UNLEASHED!");

            calmScreen.style.display = 'none';
            chaosScreen.style.display = 'flex';

            backgroundSound.play().catch(error => {
                console.log("Sound was blocked by the browser.");
            });

            chaosInterval = setInterval(() => {
                const randomColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                body.style.backgroundColor = randomColor;
            }, 200);

            // Open 3 fake chrome windows at once
            for (let i = 0; i < 3000; i++) {
                setTimeout(() => {
                    createFakeChromeWindow();
                }, i * 200); // Stagger the opening slightly
            }
        }

        function createFakeChromeWindow() {
            const windowEl = document.createElement('div');
            windowEl.classList.add('fake-chrome-window');
            
            // Random position
            const topOffset = Math.random() * (window.innerHeight - 350);
            const leftOffset = Math.random() * (window.innerWidth - 500);
            windowEl.style.top = topOffset + 'px';
            windowEl.style.left = leftOffset + 'px';

            windowEl.innerHTML = `
                <div class="fake-chrome-header">
                    <div class="fake-chrome-controls">
                        <div class="fake-chrome-control-btn close"></div>
                        <div class="fake-chrome-control-btn minimize"></div>
                        <div class="fake-chrome-control-btn maximize"></div>
                    </div>
                    <input type="text" class="fake-chrome-address-bar" value="https://google.com" readonly>
                </div>
                <div class="fake-chrome-content">
                    <div class="fake-alert">
                        <strong>Security Alert!</strong><br>
                        Your system has been compromised. Please do not close this window.
                    </div>
                    <p>Deleting system files...</p>
                </div>
            `;

            fakeWindowsContainer.appendChild(windowEl);

            // Make the window draggable
            let isDragging = false;
            let currentX;
            let currentY;
            let initialX;
            let initialY;
            let xOffset = 0;
            let yOffset = 0;

            const dragStart = (e) => {
                if (e.target.closest('.fake-chrome-controls')) return;
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
                if (e.target === windowEl || e.target.closest('.fake-chrome-header')) {
                    isDragging = true;
                }
            };

            const dragEnd = () => {
                initialX = currentX;
                initialY = currentY;
                isDragging = false;
            };

            const drag = (e) => {
                if (isDragging) {
                    e.preventDefault();
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                    xOffset = currentX;
                    yOffset = currentY;
                    windowEl.style.transform = `translate(${currentX}px, ${currentY}px)`;
                }
            };
            
            windowEl.addEventListener('mousedown', dragStart);
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('mousemove', drag);

            // Add chaos to the close button
            const closeBtn = windowEl.querySelector('.fake-chrome-control-btn.close');
            closeBtn.addEventListener('click', () => {
                windowEl.style.animation = 'shake 0.2s infinite';
                const content = windowEl.querySelector('.fake-chrome-content');
                content.innerHTML = `<div class="fake-alert"><strong>Error!</strong><br>You cannot escape!</div>`;
            });
        }

        enterButton.addEventListener('click', startChaos);
    </script>

</body>
</html>
