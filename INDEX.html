<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác Minh Người Dùng</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    background:#02060d;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:95%;
    max-width:850px;
    background:rgba(10,15,25,.9);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:30px;
}

h1{
    text-align:center;
    color:#b3b3b3;
    font-size:50px;
    margin-bottom:35px;
}

.camera{
    width:100%;
    height:420px;
    border-radius:25px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,.08);
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

button{
    width:100%;
    margin-top:25px;
    height:80px;
    border:none;
    border-radius:20px;
    background:#09111d;
    color:#7b7b7b;
    font-size:28px;
    font-weight:700;
}

.info{
    text-align:center;
    margin-top:25px;
    color:#606773;
    font-size:22px;
    line-height:1.5;
}
</style>
</head>

<body>

<div class="card">

<h1>Xác Minh Người Dùng</h1>

<div class="camera">
    <video id="video" autoplay playsinline></video>
</div>

<button id="verifyBtn">
    ĐANG XỬ LÝ...
</button>

<div class="info">
    Đang Xác Thực Khuôn Mặt...<br>
    Vui Lòng Giữ Nguyên Vị Trí.
</div>

</div>

<script>
async function startCamera(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"user"
            }
        });

        document.getElementById("video").srcObject = stream;
    }catch(err){
        alert("Bạn đã từ chối quyền camera");
    }
}

startCamera();
</script>

</body>
</html>
